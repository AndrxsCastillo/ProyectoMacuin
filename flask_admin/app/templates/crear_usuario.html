{% extends "base.html" %}

{% block content %}
<style>
    /* Estilos Corporativos para Formularios */
    .form-card {
        background-color: var(--macuin-card-bg, #ffffff);
        border: none;
        border-radius: 1rem;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
        overflow: hidden;
    }

    .form-header {
        background-color: #f8fafc;
        border-bottom: 1px solid #e2e8f0;
        padding: 1.5rem 2rem;
    }

    .form-body {
        padding: 2rem;
    }

    .macuin-label {
        color: var(--macuin-text-dark, #111827);
        font-weight: 700;
        font-size: 0.9rem;
        margin-bottom: 0.5rem;
    }

    .macuin-input {
        border: 1px solid #d1d5db;
        border-radius: 0.5rem;
        padding: 0.6rem 1rem;
        font-size: 0.95rem;
        transition: border-color 0.2s, box-shadow 0.2s;
    }

    .macuin-input:focus {
        border-color: var(--macuin-primary, #1e3a8a);
        box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
        outline: none;
    }

    /* Botones de Acción */
    .btn-guardar {
        background-color: var(--macuin-accent, #e6a73a);
        color: var(--macuin-primary, #1e3a8a);
        border: 1px solid var(--macuin-accent, #e6a73a);
        border-radius: 0.5rem;
        font-weight: 700;
        padding: 0.6rem 1.5rem;
        transition: all 0.2s ease-in-out;
    }

    .btn-guardar:hover {
        background-color: #d1962a;
        color: var(--macuin-primary, #1e3a8a);
        transform: translateY(-2px);
        box-shadow: 0 4px 10px -2px rgba(230, 167, 58, 0.4);
    }

    .btn-cancelar {
        color: #4b5563;
        background-color: #f3f4f6;
        border: 1px solid #d1d5db;
        border-radius: 0.5rem;
        font-weight: 600;
        padding: 0.6rem 1.2rem;
        transition: all 0.2s;
    }

    .btn-cancelar:hover {
        background-color: #e5e7eb;
        color: #1f2937;
    }
</style>

<div class="row justify-content-center mt-4 mb-5">
    <div class="col-lg-8 col-md-10">
        
        <div class="card form-card">
            
            <div class="form-header d-flex align-items-center">
                <div class="bg-macuin-primary-light p-2 rounded-3 me-3" style="background-color: #e0f2fe; color: #1e3a8a;">
                    <i class="bi bi-person-plus-fill fs-4"></i>
                </div>
                <div>
                    <h4 class="mb-0 fw-bold" style="color: #1e3a8a;">Registrar Nuevo Usuario</h4>
                    <span class="text-muted fs-7">Alta de personal y asignación de accesos al sistema</span>
                </div>
            </div>

            <div class="card-body form-body">
                <form action="{{ url_for('main.crear_usuario') }}" method="POST">
                    
                    <div class="row mb-4">
                        <div class="col-md-6 mb-3 mb-md-0">
                            <label for="nombre" class="form-label macuin-label">Nombre Completo</label>
                            <input type="text" class="form-control macuin-input" id="nombre" name="nombre" placeholder="Ej. Juan Pérez" required>
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label macuin-label">Correo Electrónico</label>
                            <input type="email" class="form-control macuin-input" id="email" name="email" placeholder="usuario@macuin.com" required>
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6 mb-3 mb-md-0">
                            <label for="password" class="form-label macuin-label">Contraseña Provisional</label>
                            <input type="password" class="form-control macuin-input" id="password" name="password" placeholder="••••••••••••" required>
                        </div>
                        <div class="col-md-6">
                            <label for="rol_id" class="form-label macuin-label">Rol en el Sistema</label>
                            <select class="form-select macuin-input" id="rol_id" name="rol_id" required>
                                <option value="" selected disabled>Seleccione un rol...</option>
                                {% for rol in roles %}
                                    <option value="{{ rol.id }}">{{ rol.nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <hr class="my-4 text-muted">

                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('main.usuarios') }}" class="btn btn-cancelar text-decoration-none">
                            <i class="bi bi-x-circle me-1"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-guardar">
                            <i class="bi bi-check-circle me-1"></i> Guardar Usuario
                        </button>
                    </div>
                </form>
            </div>
        </div>
        
    </div>
</div>
{% endblock %}
